metadata:
  summary: "Fedora Hyprland Atomic"

variables:
  variant: "hyprland-atomic"

include:
  - common.yaml
  - packages/hyprland-atomic.yaml

packages:

  # === NOCTALIA SHELL ===
  - noctalia-hyprland-meta
  - noctalia-shell-v5
  - noctalia-qs
  - matugen

  # === HYPRLAND CORE ===
  - hyprland
  - uwsm
  - aquamarine
  - hyprland-qt-support
  - hyprqt6engine
  - hyprcursor
  - hyprland-contrib
  - hyprland-guiutils
  - hyprtoolkit

  # === HYPRLAND UTILITIES ===
  - hyprlauncher
  - hyprsunset
  - hyprshutdown
  - hyprpolkitagent
  - hyprpwcenter
  - hyprsysteminfo
  - hyprwire
  - hyprpaper
  - hyprpicker
  - hyprshot
  - gpu-screen-recorder

  # === WAYLAND & SESSION ===
  - sddm
  - xdg-desktop-portal-hyprland
  - xdg-desktop-portal-gtk
  - uwsm

  # === DISPLAY & SCREENSHOT ===
  - grim
  - slurp
  - kanshi

  # === CLIPBOARD ===
  - wl-clipboard
  - cliphist

  # === NOTIFICATIONS ===
  - dunst

  # === FILE MANAGEMENT ===
  - nautilus
  - gnome-software
  - gvfs-mtp
  - gvfs-smb
  - sushi
  - file-roller

  # === TERMINAL & SHELL ===
  - kitty
  - zsh
  - starship
  - tmux
  - fastfetch

  # === CLI TOOLS ===
  - zoxide
  - btop
  - eza
  - bat
  - fzf
  - ripgrep
  - fd-find
  - gh

  # === HARDWARE & SYSTEM ===
  - brightnessctl
  - playerctl
  - udiskie

  # === THEMING & QT ===
  - nwg-look
  - qt5ct
  - qt6ct

  # === SECURITY & SECRETS ===
  - gnome-keyring

exclude-packages:
  - PackageKit-glib

add-files:
  - ["config/zsh/zshrc", "/etc/skel/.zshrc"]
  - ["config/starship/starship.toml", "/etc/skel/.config/starship.toml"]
  - ["config/hypr/hyprland.lua", "/etc/skel/.config/hypr/hyprland.lua"]
  - ["config/sddm/theme.conf", "/etc/sddm.conf.d/theme.conf"]
  - ["config/tmpfiles.d/sddm-themes.conf", "/etc/tmpfiles.d/sddm-themes.conf"]
  - ["config/tmpfiles.d/hyprland-atomic-user-configs.conf", "/usr/lib/user-tmpfiles.d/hyprland-atomic-user-configs.conf"]

postprocess:
  - |
    #!/usr/bin/env bash
    set -xeuo pipefail

    # Set zsh as default shell for new users
    sed -i 's#^SHELL=.*#SHELL=/bin/zsh#' /etc/default/useradd

    # Prevent gnome-keyring from registering as polkit agent
    # Keeps secrets service running for VSCode and other apps
    sed -i 's/OnlyShowIn=.*/OnlyShowIn=GNOME;/' \
      /etc/xdg/autostart/gnome-keyring-pkcs11.desktop || true
