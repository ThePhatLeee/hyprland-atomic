metadata:
  summary: "Fedora Hyprland atomic"

variables:
  variant: "hyprland-atomic"

include:
  - common.yaml
  - packages/hyprland-atomic.yaml

packages:
  # --- Core Compositor & Official Ecosystem ---
  - hyprland
  - hyprpaper
  - hyprlock
  - hypridle
  - hyprpicker
  - hyprcursor

  # --- Portals & Translation Layers ---
  - xdg-desktop-portal-hyprland
  - xdg-desktop-portal-gtk
  - qt5-wayland
  - qt6-wayland

  # --- UI Shell, Workflow & Launchers ---
  - waybar
  - rofi-wayland  
  - fuzzel        
  - swaync
  - wlogout       
  - wl-clipboard
  - cliphist
  - grim
  - slurp

  # --- Display & Monitor Utilities ---
  - wlsunset     
  - wdisplays
  - kanshi

  # --- Security, Keyring & Auth ---
  - polkit-gnome
  - gnome-keyring
  - seahorse

  # --- Hardware & System Tray Applets ---
  - network-manager-applet
  - blueman
  - pavucontrol
  - udiskie
  - brightnessctl
  - playerctl

  # --- Nautilus Full Integration Suite ---
  - nautilus
  - nautilus-python
  - gvfs
  - gvfs-mtp      
  - gvfs-smb      
  - sushi         
  - file-roller   

  # --- Theming Configuration Enablers ---
  - nwg-look      
  - qt5ct
  - qt6ct

  # --- Terminal & Developer Core ---
  - kitty
  - zsh
  - tmux
  - neovim
  - eza           
  - bat          
  - fzf
  - ripgrep

# Can only be excluded on variants that do not include GNOME Software
exclude-packages:
 
