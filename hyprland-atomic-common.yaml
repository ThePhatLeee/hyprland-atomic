metadata:
  summary: "Fedora Hyprland atomic"

variables:
  variant: "hyprland-atomic"

include:
  - common.yaml
  - packages/hyprland-atomic.yaml

packages:
  # === NOCTALIA SHELL & HYPRLAND NATIVE (From Copr) ===
  - noctalia-hyprland-meta
  - noctalia-shell-v5
  - noctalia-qs
  - quickshell
  - uwsm
  - hyprland
  - hyprlauncher
  - hyprsunset           
  - hyprshutdown         
  - hyprpolkitagent      
  - hyprpwcenter         
  - hyprsysteminfo
  - hyprwire             
  - hyprland-qt-support
  - hyprqt6engine
  - hyprcursor
  - hyprland-contrib
  - gpu-screen-recorder  

  # === CORE WAYLAND & PORTALS (Official/Copr) ===
  - xdg-desktop-portal-hyprland
  - xdg-desktop-portal-gtk
  - qt5-wayland
  - qt6-wayland
  - hyprpaper
  - hyprlock
  - hypridle
  - hyprpicker

  # === TERMINAL & DEV TOOLS (Official Fedora) ===
  - kitty                
  - zsh
  - tmux
  - starship             
  - zoxide               
  - btop                 
  - lazygit              
  - git
  - gh                   
  - eza                  
  - bat                  
  - fzf                  
  - ripgrep              
  - fd-find              
  - fastfetch            

  # === WORKFLOW & CLIPBOARD (Official) ===
  - wl-clipboard
  - cliphist
  - hyprshot
  - grim
  - slurp
  - wdisplays            
  - kanshi               

  # === NAUTILUS SUITE (Official) ===
  - nautilus
  - gvfs-mtp              
  - gvfs-smb              
  - sushi                 
  - file-roller           

  # === SECURITY & HARDWARE GLUE (Official) ===
  - gnome-keyring         
  - seahorse              
  - network-manager-applet
  - blueman
  - udiskie               
  - brightnessctl
  - playerctl
  - pavucontrol
  - nwg-look              
  - qt5ct
  - qt6ct

# Exclude packages to keep the image clean
exclude-packages:
