name: Build and Publish Hyprland Atomic

on:
  workflow_dispatch: # Keep manual triggers available
  schedule:
    - cron: "0 6 * * 1" # Weekly on Mondays at 06:00 UTC

env:
  IMAGE_NAME: "hyprland-atomic"
  IMAGE_TAG: "latest"

permissions:
  contents: read
  packages: write # Required to push to GitHub Container Registry

jobs:
  build-push-artifact:
    runs-on: ubuntu-24.04
    container:
      image: quay.io/fedora-ostree-desktops/buildroot:rawhide
      options: --security-opt=label=disable --privileged --user 0:0 --device=/dev/kvm --device=/dev/fuse --volume /:/run/host:rw --pid=host
    steps:
      - name: "Checkout repo"
        uses: actions/checkout@v4

      - name: "Runner setup"
        uses: ./.github/actions/setup

      - name: "Build OCI archive artifact"
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p cache
          rpm-ostree compose image \
            --cachedir=cache \
            --initialize \
            --max-layers=96 \
            --force-nocache \
            "${IMAGE_NAME}.yaml" \
            "${IMAGE_NAME}.ociarchive"

      - name: "Compress Artifact"
        shell: bash
        run: |
          tar -czvf ${IMAGE_NAME}.tar.gz ${IMAGE_NAME}.ociarchive

      - name: "Upload Compressed Artifact"
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.IMAGE_NAME }}-build-${{ github.run_id }}
          path: ${{ env.IMAGE_NAME }}.tar.gz
          retention-days: 14
          compression-level: 0 # Already compressed via tar.gz

      - name: "Push to GitHub Container Registry"
        shell: bash
        run: |
          set -euxo pipefail
          
          # GHCR requires repository names to be strictly lowercase
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          TARGET_IMAGE="ghcr.io/${OWNER_LOWER}/${IMAGE_NAME}:${IMAGE_TAG}"

          # Authenticate with GHCR using the built-in Actions token
          skopeo login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
          
          # Copy the local OCI archive directly to the registry
          skopeo copy oci-archive:${IMAGE_NAME}.ociarchive docker://${TARGET_IMAGE}
          
          # Generate simple rebase instructions in the GitHub Actions UI
          echo "## Build and Push Successful! 🚀" >> $GITHUB_STEP_SUMMARY
          echo "Run this command on your machine to rebase to the latest build:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "sudo rpm-ostree rebase ostree-unverified-registry:${TARGET_IMAGE}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
